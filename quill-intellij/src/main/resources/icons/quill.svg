<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B4E71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A3A5C;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Book/Quill base -->
  <rect x="2" y="3" width="12" height="10" rx="1" fill="url(#grad1)"/>
  <!-- Pages -->
  <rect x="3" y="4" width="5" height="8" fill="#F5F0E6"/>
  <rect x="8" y="4" width="5" height="8" fill="#EDE8DE"/>
  <!-- Spine -->
  <rect x="7.5" y="3" width="1" height="10" fill="#3D2E4A"/>
  <!-- Lines on pages -->
  <line x1="4" y1="6" x2="7" y2="6" stroke="#6B4E71" stroke-width="0.5"/>
  <line x1="4" y1="7.5" x2="7" y2="7.5" stroke="#6B4E71" stroke-width="0.5"/>
  <line x1="4" y1="9" x2="6" y2="9" stroke="#6B4E71" stroke-width="0.5"/>
  <line x1="9" y1="6" x2="12" y2="6" stroke="#6B4E71" stroke-width="0.5"/>
  <line x1="9" y1="7.5" x2="12" y2="7.5" stroke="#6B4E71" stroke-width="0.5"/>
  <line x1="9" y1="9" x2="11" y2="9" stroke="#6B4E71" stroke-width="0.5"/>
</svg>
